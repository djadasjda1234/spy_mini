<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SPY GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #161616;
            --primary: #7b2cbf;
            --primary-light: #9d4edd;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .screen { display: none; flex-direction: column; height: 100%; }
        .active { display: flex; }

        /* Жирный, мощный заголовок */
        h1 {
            font-size: 42px;
            font-weight: 900;
            line-height: 1;
            margin: 20px 0;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #7b2cbf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 { font-size: 24px; font-weight: 900; margin-bottom: 10px; }

        /* Карточка без лишнего блюра, просто солидная */
        .main-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #262626;
        }

        /* Кнопка: массивная и тактильная */
        .bold-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .bold-btn:active {
            transform: scale(0.96);
            background: var(--primary-light);
        }

        /* Поле ввода */
        .bold-input {
            background: #262626;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-family: inherit;
            font-weight: 700;
            outline: none;
        }

        .bold-input:focus {
            border-color: var(--primary);
        }

        /* Чат */
        .chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            background: #262626;
            padding: 14px 18px;
            border-radius: 14px;
            font-weight: 700;
            max-width: 85%;
            line-height: 1.4;
        }

        .msg-own { background: var(--primary); align-self: flex-end; }

        /* Плашка со словом */
        .word-banner {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-align: center;
            padding: 30px 0;
            letter-spacing: -1px;
        }

        .status-bar {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-light);
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen active">
        <h1>ШПИОН</h1>
        <div class="main-card">
            <div class="status-bar">Выбор режима</div>
            <div style="display: flex; flex-direction: column;">
                <button class="bold-btn" onclick="go('Brawl Stars')">BRAWL STARS</button>
                <button class="bold-btn" onclick="go('Русский рэп')">РУССКИЙ РЭП</button>
                <button class="bold-btn" style="background: #333;" onclick="go('Clash Royale')">CLASH ROYALE</button>
            </div>
        </div>
    </div>

    <div id="scr-role" class="screen">
        <div class="status-bar">Твоя секретная роль</div>
        <div class="word-banner" id="word">СЛОВО</div>
        <div class="main-card">
            <h2>ЗАПОМНИ ЭТО.</h2>
            <p style="font-weight: 700; opacity: 0.6; margin-bottom: 20px;">Твоя задача — не спалиться или вычислить крысу.</p>
            <button class="bold-btn" style="width: 100%" onclick="show('scr-game')">Я В ДЕЛЕ</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div class="status-bar" id="round-info">РАУНД 1 / 3</div>
        <div class="chat-box" id="chat">
            <div class="msg">Игра началась. Ждем твоих ассоциаций.</div>
        </div>
        
        <div style="display: flex; gap: 10px; padding-bottom: 10px;">
            <input type="text" id="msg-in" class="bold-input" style="flex-grow: 1;" placeholder="Пиши сюда...">
            <button class="bold-btn" style="margin: 0; width: 60px;" onclick="send()">✅</button>
        </div>
    </div>

    <div id="scr-vote" class="screen">
        <h1>КТО ОН?</h1>
        <div id="v-list" style="display: flex; flex-direction: column;">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0a0a0a');

        let r = 1;

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function go(topic) {
            const words = {'Brawl Stars': 'ЛЕОН', 'Русский рэп': 'МАКС КОРЖ', 'Clash Royale': 'ПЕККА'};
            document.getElementById('word').innerText = words[topic] || 'КРЫСА';
            show('scr-role');
        }

        function send() {
            const inp = document.getElementById('msg-in');
            if(!inp.value) return;

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg msg-own">${inp.value}</div>`;
            chat.scrollTop = chat.scrollHeight;

            if (r < 3) {
                r++;
                document.getElementById('round-info').innerText = `РАУНД ${r} / 3`;
            } else {
                setTimeout(() => {
                    show('scr-vote');
                    renderVotes();
                }, 600);
            }
            inp.value = '';
        }

        function renderVotes() {
            const list = document.getElementById('v-list');
            const players = ['Игрок 1', 'Игрок 2', 'Шпион'];
            list.innerHTML = players.map(p => `<button class="bold-btn" onclick="tg.close()">${p}</button>`).join('');
        }
    </script>
</body>
</html>
