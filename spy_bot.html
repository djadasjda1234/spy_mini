<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Arena: Lobby</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --green: #00ff88; --red: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        
        h1 { font-size: 42px; font-weight: 900; text-align: center; text-transform: uppercase; 
             background: linear-gradient(180deg, #fff, var(--primary)); -webkit-background-clip: text; 
             -webkit-text-fill-color: transparent; margin-bottom: 20px; }

        .glass-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #262626; 
                      display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .player-item { background: #222; padding: 15px; border-radius: 16px; font-weight: 700; 
                      display: flex; justify-content: space-between; border-left: 5px solid var(--primary); 
                      font-size: 14px; animation: fadeIn 0.3s ease; }

        .bold-btn { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 18px; 
                    font-size: 18px; font-weight: 900; text-transform: uppercase; width: 100%; transition: 0.2s; }
        .bold-btn:disabled { background: #262626; color: #555; }
        .bold-btn:active { transform: scale(0.98); }

        .status { font-size: 10px; text-align: center; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }

        .reset-btn { background: none; border: 1px solid #333; color: #555; padding: 10px; border-radius: 12px; 
                     font-size: 10px; font-weight: 900; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        .reset-btn:active { color: var(--red); border-color: var(--red); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1>ЛОББИ</h1>

    <div class="glass-card">
        <div id="status" class="status" style="color: #ff4444;">ПОДКЛЮЧЕНИЕ...</div>
        
        <div id="player-list" style="display: flex; flex-direction: column; gap: 10px; min-height: 50px;">
            </div>

        <button id="start-btn" class="bold-btn" onclick="startGame()" disabled>ЖДЕМ ИГРОКОВ (0/3)</button>
        
        <button class="reset-btn" onclick="triggerReset()">Очистить список</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ССЫЛКА ИЗ NGROK — ОБНОВЛЯЙ ПРИ КАЖДОМ ПЕРЕЗАПУСКЕ СЕРВЕРА
        const SERVER_URL = "https://joystick-roast-unable.ngrok-free.dev"; 

        // ГЕНЕРАЦИЯ НИКА (Один раз при загрузке)
        const user = tg.initDataUnsafe?.user;
        const baseName = user ? (user.username ? "@" + user.username : user.first_name) : "Игрок";
        const randomID = Math.floor(1000 + Math.random() * 9000);
        const myFullName = `${baseName}#${randomID}`;

        // Сохраняем имя локально, чтобы файл game.html его подхватил
        localStorage.setItem('spy_name', myFullName);

        async function update() {
            try {
                // 1. Отправляем "пульс" серверу (я в сети)
                await fetch(`${SERVER_URL}/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ name: myFullName })
                });

                // 2. Получаем список живых игроков
                const res = await fetch(`${SERVER_URL}/players`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await res.json();
                
                // 3. Если сервер сказал, что игра началась — улетаем в game.html
                if (data.game_active) {
                    window.location.href = "game.html";
                    return;
                }

                render(data.players);

            } catch (e) {
                document.getElementById('status').innerText = "СЕРВЕР OFFLINE";
                document.getElementById('status').style.color = "red";
            }
        }

        function render(players) {
            const list = document.getElementById('player-list');
            const btn = document.getElementById('start-btn');
            const status = document.getElementById('status');

            status.innerText = "В СЕТИ";
            status.style.color = "var(--green)";
            
            list.innerHTML = players.map(p => `
                <div class="player-item">
                    <span>${p === myFullName ? "⭐️ " + p : p}</span>
                    <span style="color:var(--green)">●</span>
                </div>
            `).join('');
            
            // Кнопка старта активна только если игроков 3+
            btn.disabled = players.length < 3;
            btn.innerText = players.length >= 3 ? "ПОГНАЛИ" : `ЖДЕМ (${players.length}/3)`;
        }

        async function startGame() {
            try {
                await fetch(`${SERVER_URL}/start_game`, {
                    method: 'POST',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
            } catch (e) {
                alert("Не удалось запустить игру");
            }
        }

        async function triggerReset() {
            if(confirm("Выгнать всех и очистить лобби?")) {
                await fetch(`${SERVER_URL}/reset`, { 
                    method: 'POST', 
                    headers: { 'ngrok-skip-browser-warning': 'true' } 
                });
                location.reload();
            }
        }

        // Обновляем лобби каждые 2 секунды
        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
