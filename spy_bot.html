<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Game Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #1a1033;
            --card: #2d1b5a;
            --accent: #9d4edd;
            --text: #ffffff;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 100vh;
        }
        .screen { display: none; flex-direction: column; gap: 15px; }
        .active { display: flex; }
        
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn {
            background: var(--accent); color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px;
        }
        .word-box { font-size: 24px; color: #ff9e00; text-align: center; margin: 20px 0; font-weight: 900; }
        .history { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active">
        <h1>Выбор битвы</h1>
        <button class="btn" onclick="nextScreen('screen-word', 'Brawl Stars')">🎮 Brawl Stars</button>
        <button class="btn" onclick="nextScreen('screen-word', 'Русский рэп')">🎤 Русский рэп</button>
    </div>

    <div id="screen-word" class="screen">
        <div class="card">
            <h2>Твоя секретная роль:</h2>
            <div id="secret-word" class="word-box">ЗАГРУЗКА...</div>
            <p>Никому не показывай экран!</p>
            <button class="btn" onclick="nextScreen('screen-battle')">В БОЙ!</button>
        </div>
    </div>

    <div id="screen-battle" class="screen">
        <div class="card">
            <h3>Раунд 1/3</h3>
            <div class="history" id="chat-log">
                <i>Ожидание ходов игроков...</i>
            </div>
            <input type="text" id="input-desc" placeholder="Твоя ассоциация..." style="padding: 10px; border-radius: 5px; border: none; margin-top: 10px;">
            <button class="btn" onclick="sendMove()">ОТПРАВИТЬ ХОД</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function nextScreen(screenId, topic = null) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if(topic) {
                // Имитация получения слова (в реале это пришлет бот)
                document.getElementById('secret-word').innerText = topic === 'Brawl Stars' ? 'ЛЕОН' : 'СКРИПТОНИТ';
            }
        }

        function sendMove() {
            const val = document.getElementById('input-desc').value;
            if(!val) return;
            
            const log = document.getElementById('chat-log');
            log.innerHTML += `<div><b>Ты:</b> ${val}</div>`;
            document.getElementById('input-desc').value = '';
            
            // Отправляем данные боту, чтобы он обновил состояние игры для всех
            tg.sendData(JSON.stringify({type: 'move', text: val}));
        }
    </script>
</body>
</html>
