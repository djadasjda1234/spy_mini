<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Arena Realtime</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; height: 100%; }
        .active { display: flex; }
        h1 { font-size: 42px; font-weight: 900; text-align: center; margin: 10px 0; background: linear-gradient(180deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #262626; display: flex; flex-direction: column; gap: 12px; }
        .bold-btn { background: var(--primary); color: #fff; border: none; border-radius: 18px; padding: 20px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .bold-btn:disabled { background: #222; color: #444; transform: none; }
        .player-row { background: #222; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; font-weight: 700; border-left: 4px solid var(--primary); }
        .loader { text-align: center; font-size: 12px; color: var(--primary); font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen active">
        <h1>ЛОББИ</h1>
        <div class="glass-card">
            <div class="loader" id="status-text">ПОИСК ИГРОКОВ...</div>
            <div id="player-list" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;">
                </div>
            <button id="start-btn" class="bold-btn" disabled onclick="showMenu()">ЖДЕМ СОСТАВ</button>
        </div>
    </div>

    <div id="scr-menu" class="screen">
        <h1>ШПИОН</h1>
        <div class="glass-card">
            <button class="bold-btn" onclick="play('Brawl Stars')">BRAWL STARS</button>
            <button class="bold-btn" onclick="play('Русский рэп')">РУССКИЙ РЭП</button>
            <button class="bold-btn" style="background:#333" onclick="play('Clash Royale')">CLASH ROYALE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0a0a0a');

        // Берем имя из телеги
        const userName = tg.initDataUnsafe?.user?.first_name || "Аноним";
        let players = [userName]; // Пока имитируем, позже привяжем сервер

        function updateLobby() {
            const list = document.getElementById('player-list');
            const btn = document.getElementById('start-btn');
            const status = document.getElementById('status-text');

            list.innerHTML = players.map(p => `<div class="player-row"><span>${p}</span><span>ГОТОВ</span></div>`).join('');
            
            if(players.length >= 2) {
                status.innerText = "ВСЕ В СБОРЕ";
                status.style.color = "#00ff00";
                btn.disabled = false;
                btn.innerText = "НАЧАТЬ";
            } else {
                status.innerText = `В ОЧЕРЕДИ: ${players.length}/3`;
            }
        }

        // Имитация захода друзей (через 2 и 4 секунды)
        // Чтобы проверить реально — скинь ссылку двум друзьям
        setTimeout(() => { players.push("Димон"); updateLobby(); }, 2000);
        setTimeout(() => { players.push("Макс"); updateLobby(); }, 4000);

        function showMenu() {
            document.getElementById('scr-lobby').classList.remove('active');
            document.getElementById('scr-menu').classList.add('active');
        }

        function play(topic) {
            // Вместо тупого alert() делаем красивое завершение
            tg.showConfirm(`Начать игру по теме ${topic}?`, (ok) => {
                if(ok) {
                    // Тут логика перехода к ролям
                    console.log("Погнали!");
                }
            });
        }

        updateLobby();
    </script>
</body>
</html>
