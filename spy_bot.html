<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Lobby</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --green: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .glass-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #262626; display: flex; flex-direction: column; gap: 12px; }
        .player-item { background: #222; padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; border-left: 5px solid var(--primary); }
        .bold-btn { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 18px; font-size: 18px; font-weight: 900; width: 100%; }
        .bold-btn:disabled { background: #262626; color: #555; }
    </style>
</head>
<body>
    <h1 style="text-align:center; text-transform:uppercase;">Лобби</h1>
    <div class="glass-card">
        <div id="status" style="text-align:center; font-size:10px; color:#555;">СИНХРОНИЗАЦИЯ...</div>
        <div id="player-list" style="display:flex; flex-direction:column; gap:10px;"></div>
        <button id="start-btn" class="bold-btn" onclick="startGame()" disabled>ЖДЕМ ИГРОКОВ</button>
        <button onclick="triggerReset()" style="background:none; border:none; color:#444; margin-top:10px; font-size:10px;">СБРОС СЕРВЕРА</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const SERVER_URL = "https://joystick-roast-unable.ngrok-free.dev"; 
        const user = tg.initDataUnsafe?.user;
        const myFullName = (user?.username ? "@"+user.username : (user?.first_name || "Игрок")) + "#" + Math.floor(1000+Math.random()*9000);
        localStorage.setItem('spy_name', myFullName);

        let redirecting = false;

        async function update() {
            if (redirecting) return;
            try {
                await fetch(`${SERVER_URL}/join`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'},
                    body: JSON.stringify({ name: myFullName })
                });

                const res = await fetch(`${SERVER_URL}/players`, { headers: {'ngrok-skip-browser-warning': 'true'} });
                const data = await res.json();
                
                if (data.game_active && !redirecting) {
                    redirecting = true;
                    window.location.replace("game.html"); // Используем replace вместо href
                    return;
                }

                document.getElementById('player-list').innerHTML = data.players.map(p => `
                    <div class="player-item"><span>${p}</span><span style="color:var(--green)">●</span></div>
                `).join('');
                
                const btn = document.getElementById('start-btn');
                btn.disabled = data.players.length < 3;
                btn.innerText = data.players.length >= 3 ? "ПОГНАЛИ" : `ЖДЕМ (${data.players.length}/3)`;
                document.getElementById('status').innerText = "В СЕТИ";
            } catch (e) { document.getElementById('status').innerText = "ОШИБКА"; }
        }

        async function startGame() {
            await fetch(`${SERVER_URL}/start_game`, { method: 'POST', headers: {'ngrok-skip-browser-warning': 'true'} });
        }

        async function triggerReset() {
            await fetch(`${SERVER_URL}/reset`, { method: 'POST', headers: {'ngrok-skip-browser-warning': 'true'} });
        }

        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
