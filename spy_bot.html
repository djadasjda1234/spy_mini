<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-bg: #0b0118;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --neon-purple: #bc13fe;
            --neon-blue: #00f2ff;
            --text: #e0e0e0;
        }

        body {
            background: var(--main-bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 100vh;
            box-sizing: border-box; overflow: hidden;
        }

        .screen { display: none; flex-direction: column; height: 100%; animation: slideUp 0.4s ease-out; }
        .active { display: flex; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Заголовок в стиле будущего */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-align: center;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(188, 19, 254, 0.5));
        }

        /* Стеклянные карточки */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Кнопки с неоновым свечением */
        .neon-btn {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: white;
            padding: 16px;
            border-radius: 15px;
            font-size: 14px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        .neon-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .neon-btn:hover::before { left: 100%; }

        .neon-btn:active {
            transform: scale(0.95);
            background: var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
        }

        /* Поле ввода */
        .cyber-input {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .cyber-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        /* История чата */
        .chat-container {
            flex-grow: 1;
            margin-bottom: 20px;
            padding-right: 10px;
            overflow-y: auto;
        }

        .message {
            background: var(--glass);
            padding: 12px 18px;
            border-radius: 15px;
            margin-bottom: 10px;
            border-left: 3px solid var(--neon-blue);
            font-size: 14px;
        }

        .role-badge {
            font-size: 38px;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin: 30px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen active">
        <h1>SPY_OS</h1>
        <div class="glass-card">
            <p style="text-align: center; font-size: 12px; letter-spacing: 2px; opacity: 0.6;">INITIALIZING GAME_CORE...</p>
            <button class="neon-btn" onclick="startApp('Brawl Stars')">🎮 BRAWL_STARS</button>
            <button class="neon-btn" onclick="startApp('Русский рэп')">🎤 RU_RAP_VIBE</button>
            <button class="neon-btn" style="border-color: var(--neon-blue)" onclick="startApp('Clash Royale')">👑 CLASH_ROYALE</button>
        </div>
    </div>

    <div id="scr-role" class="screen">
        <div class="glass-card" style="text-align: center;">
            <p style="font-family: 'Orbitron'; font-size: 10px; color: var(--neon-purple);">DATA_DECRYPTED</p>
            <h2 style="font-family: 'Orbitron';">YOUR WORD:</h2>
            <div id="word" class="role-badge">---</div>
            <p style="font-size: 12px; opacity: 0.5;">3 ROUNDS REMAINING. DON'T FAIL.</p>
            <button class="neon-btn" onclick="showScreen('scr-game')">START MISSION</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span id="round-title" style="font-family: 'Orbitron'; font-size: 12px;">ROUND: 01/03</span>
            <div style="width: 10px; height: 10px; background: #0f0; border-radius: 50%; box-shadow: 0 0 10px #0f0;"></div>
        </div>
        
        <div class="chat-container" id="chat">
            <div class="message" style="border-color: var(--neon-purple)">CONNECTION ESTABLISHED... Waiting for input.</div>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="msg" class="cyber-input" placeholder="ENTER ASSOCIATION..." style="flex-grow: 1;">
            <button class="neon-btn" style="margin: 0; width: 60px;" onclick="send()">></button>
        </div>
    </div>

    <div id="scr-vote" class="screen">
        <h1 style="font-size: 20px;">ELIMINATION_PHASE</h1>
        <div id="vote-list" class="glass-card" style="display: flex; flex-direction: column; gap: 10px;">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0b0118');

        let round = 1;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startApp(topic) {
            const wordMap = {
                'Brawl Stars': 'LEON',
                'Русский рэп': 'SCRIPTORITE',
                'Clash Royale': 'PEKKA'
            };
            document.getElementById('word').innerText = wordMap[topic] || 'SECRET';
            showScreen('scr-role');
        }

        function send() {
            const input = document.getElementById('msg');
            if(!input.value) return;

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="message"><b>USER_LOCAL:</b> ${input.value}</div>`;
            chat.scrollTop = chat.scrollHeight;
            
            if (round < 3) {
                round++;
                document.getElementById('round-title').innerText = `ROUND: 0${round}/03`;
            } else {
                setTimeout(() => {
                    showScreen('scr-vote');
                    renderVotes();
                }, 800);
            }
            input.value = '';
        }

        function renderVotes() {
            const list = document.getElementById('vote-list');
            const players = ['Player_X', 'Player_Y', 'Spy_Target'];
            list.innerHTML = players.map(p => `<button class="neon-btn" onclick="tg.close()">${p}</button>`).join('');
        }
    </script>
</body>
</html>
