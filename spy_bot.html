<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0f; --card: #1a1a1d; --primary: #8a2be2; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; width: 100%; }
        .active { display: flex; }
        h1 { font-size: 42px; font-weight: 900; text-align: center; background: linear-gradient(180deg, #fff, var(--primary)); background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #2d2d31; display: flex; flex-direction: column; gap: 15px; }
        .bold-btn { background: var(--primary); color: #fff; border: none; border-radius: 18px; padding: 18px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .bold-btn:disabled { background: #333; color: #777; cursor: not-allowed; }
        .player-badge { background: #262626; padding: 15px; border-radius: 12px; font-weight: 700; display: flex; justify-content: space-between; }
        .status { color: var(--primary); font-size: 12px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen active">
        <h1>ЛОББИ</h1>
        <div class="glass-card">
            <div class="status" id="lobby-status">Ожидание игроков (1/3)</div>
            <div id="player-list" style="display: flex; flex-direction: column; gap: 10px;">
                <div class="player-badge"><span>Ты</span> <span>✅</span></div>
                </div>
            <button id="start-btn" class="bold-btn" disabled onclick="showScreen('scr-menu')">ЖДЕМ ИГРОКОВ</button>
        </div>
    </div>

    <div id="scr-menu" class="screen">
        <h1>ШПИОН</h1>
        <div class="glass-card">
            <button class="bold-btn" onclick="startGame('Brawl Stars')">BRAWL STARS</button>
            <button class="bold-btn" onclick="startGame('Русский рэп')">РУССКИЙ РЭП</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "ТВОЯ_ССЫЛКА_ИЗ_NGROK"; // Вставь сюда ссылку от ngrok

async function refreshLobby() {
    try {
        // Сообщаем серверу, что мы зашли
        await fetch(`${https://joystick-roast-unable.ngrok-free.dev}/join`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: myName })
        });

        // Получаем список всех игроков
        const response = await fetch(`${SERVER_URL}/players`);
        const data = await response.json();
        renderPlayers(data.players);
    } catch (e) {
        console.error("Ошибка сервера:", e);
        document.getElementById('lobby-status').innerText = "ОШИБКА ПОДКЛЮЧЕНИЯ";
    }
}

// Запускаем авто-обновление каждые 2 секунды
setInterval(refreshLobby, 2000);

        // Запускаем имитацию через 3 и 6 секунд
        setTimeout(simulatePlayers, 3000);
        setTimeout(simulatePlayers, 6000);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame(topic) {
            alert("Игра по теме " + topic + " началась!");
        }
    </script>
</body>
</html>
