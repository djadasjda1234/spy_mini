<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Arena Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --text: #fff; --green: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        h1 { font-size: 42px; font-weight: 900; text-align: center; text-transform: uppercase; background: linear-gradient(180deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #262626; display: flex; flex-direction: column; gap: 15px; }
        .status-label { font-size: 13px; font-weight: 900; text-align: center; text-transform: uppercase; margin-bottom: 10px; }
        .player-item { background: #222; padding: 15px; border-radius: 15px; font-weight: 700; display: flex; justify-content: space-between; border-left: 5px solid var(--primary); }
        .bold-btn { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 18px; font-size: 18px; font-weight: 900; text-transform: uppercase; width: 100%; margin-top: 10px; }
        .bold-btn:disabled { background: #262626; color: #555; }
        .reset-link { color: #555; font-size: 10px; text-align: center; cursor: pointer; text-decoration: underline; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>ЛОББИ</h1>
    <div class="glass-card">
        <div id="status" class="status-label" style="color: #ff4444;">ПОДКЛЮЧЕНИЕ...</div>
        <div id="player-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
        <button id="start-btn" class="bold-btn" disabled>ЖДЕМ ИГРОКОВ</button>
        <div class="reset-link" onclick="resetLobby()">СБРОСИТЬ ВСЕХ ИГРОКОВ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ОБЯЗАТЕЛЬНО ОБНОВИ ЭТУ ССЫЛКУ ПОСЛЕ ЗАПУСКА NGROK!
        const SERVER_URL = "https://joystick-roast-unable.ngrok-free.dev"; 

        const myName = tg.initDataUnsafe?.user?.first_name || "Игрок";

        async function sync() {
            try {
                // Заходим в лобби
                const joinRes = await fetch(`${SERVER_URL}/join`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // Убирает белое окно ngrok
                    },
                    body: JSON.stringify({ name: myName })
                });

                if (joinRes.ok) {
                    // Получаем свежий список
                    const res = await fetch(`${SERVER_URL}/players`, {
                        headers: { 'ngrok-skip-browser-warning': 'true' }
                    });
                    const data = await res.json();
                    
                    render(data.players);
                }
            } catch (err) {
                document.getElementById('status').innerText = "ОФФЛАЙН (ПРОВЕРЬ NGROK)";
                document.getElementById('status').style.color = "#ff4444";
            }
        }

        function render(players) {
            const list = document.getElementById('player-list');
            const btn = document.getElementById('start-btn');
            const status = document.getElementById('status');

            status.innerText = "СВЯЗЬ УСТАНОВЛЕНА";
            status.style.color = "var(--green)";
            
            list.innerHTML = players.map(p => `
                <div class="player-item">
                    <span>${p}</span>
                    <span style="color:var(--green)">●</span>
                </div>
            `).join('');
            
            if(players.length >= 3) {
                btn.disabled = false;
                btn.innerText = "ПОГНАЛИ";
            } else {
                btn.disabled = true;
                btn.innerText = `НУЖНО ЕЩЕ ${3 - players.length}`;
            }
        }

        async function resetLobby() {
            if(confirm("Очистить список игроков?")) {
                await fetch(`${SERVER_URL}/reset`, { 
                    method: 'POST',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                location.reload();
            }
        }

        setInterval(sync, 2000); // Обновление каждые 2 секунды
        sync();
    </script>
</body>
</html>
