<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; }
        .active { display: flex; }
        h1 { font-size: 42px; font-weight: 900; text-align: center; background: linear-gradient(180deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
        .glass-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #262626; display: flex; flex-direction: column; gap: 15px; }
        .bold-btn { background: var(--primary); color: #fff; border: none; border-radius: 18px; padding: 20px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .bold-btn:disabled { background: #222; color: #444; }
        .player-row { background: #222; padding: 15px; border-radius: 12px; font-weight: 700; border-left: 4px solid var(--primary); margin-bottom: 8px; }
        .status { color: var(--primary); font-size: 12px; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen active">
        <h1>ЛОББИ</h1>
        <div class="glass-card">
            <div class="status" id="lobby-status">ПОДКЛЮЧЕНИЕ К СЕРВЕРУ...</div>
            <div id="player-list">
                </div>
            <button id="start-btn" class="bold-btn" disabled onclick="showMenu()">ЖДЕМ ИГРОКОВ (0/3)</button>
            <button class="bold-btn" style="background: #333; margin-top: 10px;" onclick="refreshLobby()">ОБНОВИТЬ СПИСОК</button>
        </div>
    </div>

    <div id="scr-menu" class="screen">
        <h1>ШПИОН</h1>
        <div class="glass-card">
            <button class="bold-btn" onclick="startGame('Brawl Stars')">BRAWL STARS</button>
            <button class="bold-btn" onclick="startGame('Русский рэп')">РУССКИЙ РЭП</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const myName = user ? (user.first_name || user.username) : "Аноним";

        // Функция получения списка игроков из "облака" Telegram
        function refreshLobby() {
            const status = document.getElementById('lobby-status');
            status.innerText = "ОБНОВЛЕНИЕ...";

            // В идеале здесь должен быть запрос к твоему Python серверу.
            // Пока мы используем имитацию логики входа, но БЕЗ авто-добавления ботов.
            // Чтобы это работало реально на 3-х устройствах, нужен бэкенд.
            
            renderPlayers([myName]); 
        }

        function renderPlayers(list) {
            const container = document.getElementById('player-list');
            const btn = document.getElementById('start-btn');
            const status = document.getElementById('lobby-status');

            container.innerHTML = list.map(p => `<div class="player-row">${p} ✅</div>`).join('');
            
            const count = list.length;
            status.innerText = `В ОЧЕРЕДИ: ${count}/3`;

            if (count >= 3) {
                btn.disabled = false;
                btn.innerText = "НАЧАТЬ ИГРУ";
                status.style.color = "#00ff00";
            } else {
                btn.disabled = true;
                btn.innerText = `НУЖНО ЕЩЕ ${3 - count}`;
            }
        }

        function showMenu() {
            document.getElementById('scr-lobby').classList.remove('active');
            document.getElementById('scr-menu').classList.add('active');
        }

        function startGame(topic) {
            tg.showConfirm(`Выбрана тема: ${topic}. Начинаем?`, (ok) => {
                if(ok) {
                    // Переход к логике ролей
                }
            });
        }

        // При запуске
        refreshLobby();
    </script>
</body>
</html>
