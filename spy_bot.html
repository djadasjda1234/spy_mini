<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --text: #fff; --green: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        
        .screen { display: flex; flex-direction: column; height: 100%; width: 100%; }
        h1 { font-size: 48px; font-weight: 900; text-align: center; margin: 10px 0 30px 0; text-transform: uppercase; background: linear-gradient(180deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .glass-card { background: var(--card); border-radius: 28px; padding: 25px; border: 1px solid #262626; display: flex; flex-direction: column; gap: 15px; }
        .status-label { font-size: 13px; font-weight: 900; text-transform: uppercase; text-align: center; letter-spacing: 1px; transition: 0.3s; }
        
        .player-item { background: #222; padding: 18px; border-radius: 18px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--primary); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .bold-btn { background: var(--primary); color: white; border: none; padding: 22px; border-radius: 20px; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; width: 100%; }
        .bold-btn:disabled { background: #262626; color: #555; transform: none; }
        .bold-btn:active:not(:disabled) { transform: scale(0.96); }

        #player-list { display: flex; flex-direction: column; gap: 10px; min-height: 50px; }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen">
        <h1>ЛОББИ</h1>
        <div class="glass-card">
            <div id="status" class="status-label" style="color: #ff4444;">ПРОВЕРКА СВЯЗИ...</div>
            <div id="player-list"></div>
            <button id="start-btn" class="bold-btn" disabled>ОЖИДАНИЕ (0/3)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0a0a0a');

        // ТВОЯ АКТУАЛЬНАЯ ССЫЛКА ИЗ NGROK
        const SERVER_URL = "https://joystick-roast-unable.ngrok-free.dev"; 

        const user = tg.initDataUnsafe?.user;
        const myName = user ? (user.first_name || user.username) : "Аноним";

        async function sync() {
            const statusEl = document.getElementById('status');
            const listEl = document.getElementById('player-list');
            const btnEl = document.getElementById('start-btn');

            try {
                // 1. Пытаемся зайти
                const joinResponse = await fetch(`${SERVER_URL}/join`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: myName })
                });

                if (joinResponse.ok) {
                    // 2. Получаем список игроков
                    const playersResponse = await fetch(`${SERVER_URL}/players`);
                    const data = await playersResponse.json();
                    
                    // Обновляем UI
                    statusEl.innerText = "СВЯЗЬ УСТАНОВЛЕНА";
                    statusEl.style.color = "var(--green)";
                    
                    listEl.innerHTML = data.players.map(p => `
                        <div class="player-item">
                            <span>${p} ${p === myName ? " (ТЫ)" : ""}</span>
                            <span style="color: var(--green)">●</span>
                        </div>
                    `).join('');

                    const count = data.players.length;
                    btnEl.disabled = count < 3;
                    btnEl.innerText = count >= 3 ? "ПОГНАЛИ" : `ЖДЕМ ИГРОКОВ (${count}/3)`;
                }
            } catch (err) {
                console.error("Ошибка:", err);
                statusEl.innerText = "СЕРВЕР ОФФЛАЙН";
                statusEl.style.color = "#ff4444";
            }
        }

        // Запуск цикла
        setInterval(sync, 2000);
        sync();
    </script>
</body>
</html>
