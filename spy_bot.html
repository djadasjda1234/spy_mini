<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Arena FINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --text: #fff; --green: #00ff88; --red: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; min-height: 100vh; }
        
        h1 { font-size: 42px; font-weight: 900; text-align: center; text-transform: uppercase; margin: 10px 0 25px 0; background: linear-gradient(180deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .glass-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #262626; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .status-label { font-size: 11px; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        #player-list { display: flex; flex-direction: column; gap: 10px; margin: 10px 0; }
        
        .player-item { background: #222; padding: 16px; border-radius: 16px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .bold-btn { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 18px; font-size: 18px; font-weight: 900; text-transform: uppercase; width: 100%; transition: 0.2s; cursor: pointer; }
        .bold-btn:disabled { background: #262626; color: #555; }
        
        .debug-box { margin-top: auto; padding: 10px; font-size: 9px; color: #444; text-align: center; font-family: monospace; }
        .reset-btn { background: none; border: 1px solid #333; color: #555; padding: 8px; border-radius: 10px; font-size: 10px; text-transform: uppercase; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="screen">
        <h1>ЛОББИ</h1>
        
        <div class="glass-card">
            <div id="status" class="status-label" style="color: var(--red);">ПОДКЛЮЧЕНИЕ...</div>
            
            <div id="player-list">
                </div>
            
            <button id="start-btn" class="bold-btn" disabled>НУЖНО 3 ИГРОКА</button>
            <button class="reset-btn" onclick="resetLobby()">СБРОСИТЬ ВСЕХ ИГРОКОВ</button>
        </div>

        <div class="debug-box" id="debug-info">
            Инициализация...
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // !!! СЮДА ВСТАВЬ СВОЮ АКТУАЛЬНУЮ ССЫЛКУ ИЗ NGROK !!!
        const SERVER_URL = "https://joystick-roast-unable.ngrok-free.dev"; 

        // Генерируем случайный ID, чтобы сервер не путал людей с одинаковыми именами
        const userId = Math.floor(Math.random() * 10000);
        const rawName = tg.initDataUnsafe?.user?.first_name || "Игрок";
        const myName = `${rawName}#${userId}`;

        const debugEl = document.getElementById('debug-info');
        debugEl.innerText = `Подключен как: ${myName} | URL: ${SERVER_URL}`;

        async function sync() {
            try {
                // 1. Отправляем запрос на вход
                const joinRes = await fetch(`${SERVER_URL}/join`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // Пропуск варнинга ngrok
                    },
                    body: JSON.stringify({ name: myName })
                });

                if (joinRes.ok) {
                    // 2. Спрашиваем список всех игроков
                    const res = await fetch(`${SERVER_URL}/players`, {
                        headers: { 'ngrok-skip-browser-warning': 'true' }
                    });
                    const data = await res.json();
                    
                    render(data.players);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "СЕРВЕР ОФФЛАЙН";
                document.getElementById('status').style.color = "var(--red)";
            }
        }

        function render(players) {
            const list = document.getElementById('player-list');
            const btn = document.getElementById('start-btn');
            const status = document.getElementById('status');

            status.innerText = "СВЯЗЬ УСТАНОВЛЕНА";
            status.style.color = "var(--green)";
            
            // Отрисовка игроков
            list.innerHTML = players.map(p => `
                <div class="player-item">
                    <span>${p}</span>
                    <span style="color:var(--green)">●</span>
                </div>
            `).join('');
            
            // Логика кнопки
            if(players.length >= 3) {
                btn.disabled = false;
                btn.innerText = "ПОГНАЛИ";
                btn.style.background = "var(--primary)";
            } else {
                btn.disabled = true;
                btn.innerText = `НУЖНО ЕЩЕ ${3 - players.length}`;
            }
        }

        async function resetLobby() {
            if(confirm("Очистить список на сервере?")) {
                try {
                    await fetch(`${SERVER_URL}/reset`, { 
                        method: 'POST', 
                        headers: { 'ngrok-skip-browser-warning': 'true' }
                    });
                    location.reload();
                } catch(e) { alert("Ошибка при сбросе"); }
            }
        }

        // Запускаем бесконечный цикл обновления каждые 2 секунды
        setInterval(sync, 2000);
        sync();
    </script>
</body>
</html>
