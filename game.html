<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --red: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #262626; margin-bottom: 10px; }
        #chat { flex-grow: 1; overflow-y: auto; background: #000; border-radius: 20px; padding: 15px; border: 1px solid #1a1a1a; margin-bottom: 10px; }
        .input-area { display: flex; gap: 8px; background: var(--card); padding: 8px; border-radius: 18px; }
        input { flex-grow: 1; background: none; border: none; color: #fff; padding: 10px; }
        .s-btn { background: #00ff88; border: none; width: 45px; height: 45px; border-radius: 12px; }
        .stop-btn { background: none; border: 1px solid #400; color: #600; padding: 5px; font-size: 8px; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="r-tag" style="color:var(--primary); font-size:10px;">РОЛЬ...</div>
        <div id="w-tag" style="font-size:20px; font-weight:900;">СЛОВО...</div>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input id="in" type="text" placeholder="Ваш ход..." disabled>
        <button id="btn" class="s-btn" onclick="send()" disabled>></button>
    </div>

    <button class="stop-btn" onclick="stop()">ЭКСТРЕННЫЙ СТОП</button>

    <script>
        const SERVER_URL = "https://joystick-roast-unable.ngrok-free.dev"; 
        const myName = localStorage.getItem('spy_name');
        let isExiting = false;

        async function sync() {
            if (isExiting) return;
            try {
                const r = await fetch(`${SERVER_URL}/game_data?name=${encodeURIComponent(myName)}`, { headers: {'ngrok-skip-browser-warning': 'true'} });
                const d = await r.json();
                
                // ЕСЛИ ИГРА НЕ АКТИВНА - ВЫХОДИМ МГНОВЕННО
                if (!d.active) {
                    isExiting = true;
                    window.location.replace("spy_bot.html");
                    return;
                }

                document.getElementById('r-tag').innerText = d.role;
                document.getElementById('w-tag').innerText = d.word;
                
                const input = document.getElementById('in');
                const btn = document.getElementById('btn');
                input.disabled = !d.is_my_turn;
                btn.disabled = !d.is_my_turn;

                document.getElementById('chat').innerHTML = d.messages.map(m => `
                    <div style="margin-bottom:10px;">
                        <div style="font-size:10px; color:#444;">${m.user}</div>
                        <div style="background:#222; padding:8px; border-radius:10px; display:inline-block;">${m.text}</div>
                    </div>
                `).join('');
            } catch (e) { console.log("error sync"); }
        }

        async function send() {
            const el = document.getElementById('in');
            const val = el.value;
            el.value = "";
            await fetch(`${SERVER_URL}/send_message`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'},
                body: JSON.stringify({ name: myName, text: val })
            });
            sync();
        }

        async function stop() {
            await fetch(`${SERVER_URL}/reset`, { method: 'POST', headers: {'ngrok-skip-browser-warning': 'true'} });
        }

        setInterval(sync, 2000);
        sync();
    </script>
</body>
</html>
