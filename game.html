<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Arena: Full Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --red: #ff4444; --green: #00ff88; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden; }
        
        /* Шапка с инфой */
        .header-card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #262626; margin-bottom: 10px; position: relative; }
        .role-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .word-display { font-size: 22px; font-weight: 900; color: var(--text); }
        .round-info { position: absolute; right: 15px; top: 15px; font-size: 10px; color: #555; font-weight: 900; }

        /* Чат */
        #chat-container { flex-grow: 1; overflow-y: auto; background: #000; border-radius: 20px; padding: 15px; border: 1px solid #1a1a1a; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 85%; animation: fadeIn 0.3s ease; }
        .msg.me { align-self: flex-end; text-align: right; }
        .msg-u { font-size: 9px; color: #444; margin-bottom: 2px; text-transform: uppercase; }
        .msg-t { background: #222; padding: 10px 14px; border-radius: 15px; display: inline-block; font-size: 14px; line-height: 1.4; }
        .msg.me .msg-t { background: var(--primary); }

        /* Индикатор хода */
        .turn-bar { text-align: center; font-size: 11px; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; transition: 0.3s; }

        /* Поле ввода */
        .input-box { display: flex; gap: 8px; background: var(--card); padding: 8px; border-radius: 18px; border: 1px solid #262626; }
        input { flex-grow: 1; background: none; border: none; color: #fff; padding: 10px; font-family: inherit; outline: none; }
        input:disabled { opacity: 0.2; }
        .send-btn { background: var(--green); border: none; width: 45px; height: 45px; border-radius: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .send-btn:disabled { background: #222; filter: grayscale(1); }

        /* Экраны фаз */
        .phase-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }
        
        .grid-vote { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 20px; }
        .v-btn { background: var(--card); border: 1px solid #333; color: #fff; padding: 20px; border-radius: 15px; font-weight: 700; font-size: 14px; }
        .v-btn:active { background: var(--primary); }

        .result-card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--primary); width: 80%; }
        .btn-exit { background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="main-game" style="display: contents;">
        <div class="header-card">
            <div id="round-num" class="round-info">КРУГ 1/3</div>
            <div id="my-role" class="role-badge" style="background: var(--primary);">РОЛЬ</div>
            <div id="target-word" class="word-display">ЗАГРУЗКА...</div>
            <div id="category-name" style="font-size: 10px; color: #555; margin-top: 3px;">КАТЕГОРИЯ: ...</div>
        </div>

        <div id="turn-indicator" class="turn-bar">ОЖИДАНИЕ...</div>

        <div id="chat-container">
            </div>

        <div class="input-box">
            <input id="chat-input" type="text" placeholder="Ваш ход..." disabled>
            <button id="send-btn" class="send-btn" onclick="sendMsg()" disabled>></button>
        </div>
    </div>

    <div id="screen-vote" class="phase-screen hidden">
        <h1 style="text-transform: uppercase; font-size: 32px;">КТО ШПИОН?</h1>
        <p style="color: #666; font-size: 14px;">Выберите игрока, который вёл себя подозрительно</p>
        <div id="vote-list" class="grid-vote"></div>
    </div>

    <div id="screen-spy" class="phase-screen hidden">
        <h1 style="color: var(--red); text-transform: uppercase;">ВЫ РАСКРЫТЫ!</h1>
        <p>У вас есть шанс победить, если назовете загаданное слово:</p>
        <div class="input-box" style="width: 100%; margin-top: 20px;">
            <input id="spy-guess-input" type="text" placeholder="Введите слово...">
            <button class="send-btn" onclick="sendSpyGuess()" style="background: var(--red); color: white;">OK</button>
        </div>
    </div>

    <div id="screen-results" class="phase-screen hidden">
        <div class="result-card">
            <h2 id="win-title" style="margin: 0; color: var(--green);">ИГРА ЗАВЕРШЕНА</h2>
            <p id="spy-name-reveal" style="margin: 15px 0; font-weight: 700;"></p>
            <p id="spy-answer-text" style="font-size: 13px; color: #888;"></p>
            <button class="btn-exit" onclick="exitToLobby()">В ЛОББИ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ОБЯЗАТЕЛЬНО ПРОВЕРЬ ЭТУ ССЫЛКУ ИЗ NGROK ПЕРЕД ТЕСТОМ!
        const SERVER_URL = "https://joystick-roast-unable.ngrok-free.dev"; 
        
        const myName = localStorage.getItem('spy_name');

        async function sync() {
            try {
                const response = await fetch(`${SERVER_URL}/game_data?name=${encodeURIComponent(myName)}`, {
                    headers: {'ngrok-skip-browser-warning': 'true'}
                });
                const data = await response.json();
                
                if (!data.active) return;

                // 1. Обновляем базовую инфу
                document.getElementById('my-role').innerText = data.role;
                document.getElementById('my-role').style.background = data.role === "ШПИОН" ? "var(--red)" : "var(--primary)";
                document.getElementById('target-word').innerText = data.word;
                document.getElementById('category-name').innerText = "КАТЕГОРИЯ: " + data.category;
                document.getElementById('round-num').innerText = `КРУГ ${data.round}/3`;

                // 2. Управляем фазами (экранами)
                document.getElementById('screen-vote').classList.toggle('hidden', data.phase !== 'VOTING');
                document.getElementById('screen-spy').classList.toggle('hidden', data.phase !== 'SPY_GUESS' || data.role !== 'ШПИОН');
                
                // Если сейчас ход шпиона, а ты НЕ шпион — показываем экран ожидания
                if (data.phase === 'SPY_GUESS' && data.role !== 'ШПИОН') {
                    document.getElementById('turn-indicator').innerText = "ШПИОН УГАДЫВАЕТ СЛОВО...";
                    document.getElementById('turn-indicator').style.color = "var(--red)";
                }

                document.getElementById('screen-results').classList.toggle('hidden', data.phase !== 'RESULTS');

                // 3. Логика Чата (Фаза CHAT)
                if (data.phase === 'CHAT') {
                    const indicator = document.getElementById('turn-indicator');
                    const input = document.getElementById('chat-input');
                    const btn = document.getElementById('send-btn');

                    if (data.is_my_turn) {
                        indicator.innerText = "ВАШ ХОД! ПИШИТЕ...";
                        indicator.style.color = "var(--green)";
                        input.disabled = false;
                        btn.disabled = false;
                    } else {
                        indicator.innerText = `СЕЙЧАС ПИШЕТ: ${data.current_turn}`;
                        indicator.style.color = "#555";
                        input.disabled = true;
                        btn.disabled = true;
                    }

                    // Сообщения
                    const chatBox = document.getElementById('chat-container');
                    const newHtml = data.messages.map(m => `
                        <div class="msg ${m.user === myName ? 'me' : ''}">
                            <div class="msg-u">${m.user}</div>
                            <div class="msg-t">${m.text}</div>
                        </div>
                    `).join('');
                    
                    if (chatBox.innerHTML !== newHtml) {
                        chatBox.innerHTML = newHtml;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                }

                // 4. Логика голосования
                if (data.phase === 'VOTING') {
                    const vList = document.getElementById('vote-list');
                    if (vList.innerHTML === "") { // Чтобы кнопки не перерисовывались постоянно
                        vList.innerHTML = data.order
                            .filter(p => p !== myName)
                            .map(p => `<button class="v-btn" onclick="sendVote('${p}')">${p}</button>`)
                            .join('');
                    }
                }

                // 5. Логика результатов
                if (data.phase === 'RESULTS') {
                    document.getElementById('spy-name-reveal').innerText = `Шпионом был: ${data.spy}`;
                    document.getElementById('spy-answer-text').innerText = `Ответ шпиона: ${data.spy_guess || "не успел ответить"}`;
                }

            } catch (err) {
                console.error("Sync error:", err);
            }
        }

        async function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            await fetch(`${SERVER_URL}/send_message`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'},
                body: JSON.stringify({ name: myName, text: text })
            });
            sync();
        }

        async function sendVote(target) {
            document.getElementById('screen-vote').innerHTML = "<h1>ГОЛОС ПРИНЯТ</h1><p>Ждем остальных...</p>";
            await fetch(`${SERVER_URL}/vote`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'},
                body: JSON.stringify({ name: myName, target: target })
            });
        }

        async function sendSpyGuess() {
            const val = document.getElementById('spy-guess-input').value;
            await fetch(`${SERVER_URL}/spy_guess`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'},
                body: JSON.stringify({ name: myName, text: val })
            });
        }

        async function exitToLobby() {
            await fetch(`${SERVER_URL}/reset`, { method: 'POST', headers: {'ngrok-skip-browser-warning': 'true'} });
            window.location.href = "spy_bot.html";
        }

        setInterval(sync, 2000);
        sync();
    </script>
</body>
</html>
