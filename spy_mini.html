<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy Arena Rooms</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --primary: #7b2cbf; --red: #ff4444; --green: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        .hidden { display: none !important; }
        .glass-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #262626; margin-bottom: 10px; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; text-transform: uppercase; cursor: pointer; }
        .btn:disabled { background: #222; color: #555; }
        .btn-risk { background: #441010; color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 12px; font-size: 10px; margin-top: 10px; width: auto; font-weight: 900; cursor: pointer; }
        input { width: 100%; background: #000 !important; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; margin-bottom: 10px; }
        #chat-box { flex-grow: 1; overflow-y: auto; background: #000; border-radius: 20px; padding: 15px; border: 1px solid #1a1a1a; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #222; padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--primary); }
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .grid-vote { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .v-btn { background: var(--card); border: 1px solid #333; color: #fff; padding: 20px; border-radius: 15px; font-weight: 700; }
        .circle-reset { background: #300; color: var(--red); border: 1px solid #500; width: 24px; height: 24px; border-radius: 50%; font-size: 18px; line-height: 22px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 5px; margin-left: auto; }
        #turn-indicator { text-align: center; font-size: 11px; margin-bottom: 10px; padding: 5px; border-radius: 10px; background: #111; color: #aaa; }
    </style>
</head>
<body>

    <div id="screen-auth" class="overlay hidden">
        <h1 style="font-size: 32px;">SPY ARENA</h1>
        <div class="glass-card" style="width: 100%;">
            <input id="nick-input" type="text" placeholder="Твой ник..." onkeydown="if(event.key==='Enter') confirmNick()">
            <button class="btn" onclick="confirmNick()">ДАЛЕЕ</button>
        </div>
    </div>

    <div id="screen-room-select" class="overlay hidden">
        <h2>СЕССИЯ</h2>
        <div class="glass-card" style="width: 100%;">
            <input id="room-input" type="text" placeholder="ID Комнаты" onkeydown="if(event.key==='Enter') confirmRoom()">
            <button class="btn" onclick="confirmRoom()">ВОЙТИ</button>
            <button class="btn" style="background:#222; margin-top:10px; font-size:10px;" onclick="localStorage.clear(); location.reload();">СМЕНИТЬ НИК</button>
        </div>
    </div>

    <div id="screen-lobby" class="hidden">
        <h1 style="text-align:center;">КОМНАТА: <span id="display-room"></span></h1>
        <div class="glass-card">
            <div style="display: flex; justify-content: flex-end;"><div class="circle-reset" onclick="triggerReset()">×</div></div>
            <div id="player-list" style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px;"></div>
            <button id="start-btn" class="btn" onclick="startGame()" disabled>ЖДЕМ ИГРОКОВ</button>
        </div>
    </div>

    <div id="screen-game" class="hidden" style="flex-grow:1; display:flex; flex-direction:column;">
        <div class="glass-card" style="padding: 15px; margin-bottom: 5px;">
            <div style="display:flex; justify-content:space-between;">
                <div>
                    <div id="g-role" style="font-size:10px; font-weight:900;">РОЛЬ</div>
                    <button id="risk-btn" class="btn-risk hidden" onclick="toggleRiskMenu(true)">УГАДАТЬ СЛОВО</button>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                    <div id="g-round" style="font-size:10px; font-weight:900; color:#555;">КРУГ 1/3</div>
                    <div class="circle-reset" onclick="triggerReset()">×</div>
                </div>
            </div>
            <div id="g-word" style="font-size:24px; font-weight:900;">...</div>
            <div id="g-category" style="font-size:11px; color: var(--green);">...</div>
        </div>
        <div id="turn-indicator">ЗАГРУЗКА...</div>
        <div id="chat-box"></div>
        <div style="display:flex; gap:8px; background:var(--card); padding:8px; border-radius:18px;">
            <input id="chat-in" style="margin-bottom:0; flex-grow:1; background:none; border:none;" placeholder="Ваш ответ..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button id="send-btn" class="btn" onclick="sendMsg()" style="width:60px; padding:0;">></button>
        </div>
    </div>

    <div id="overlay-risk" class="overlay hidden">
        <h2 style="color:var(--red)">ВА-БАНК</h2>
        <div class="glass-card" style="width: 100%;">
            <input id="risk-input" type="text" placeholder="Введите слово..." onkeydown="if(event.key==='Enter') sendSpyGuess('risk')">
            <button class="btn" onclick="sendSpyGuess('risk')">УГАДАТЬ</button>
            <button class="btn" style="background:#222; margin-top:10px;" onclick="toggleRiskMenu(false)">НАЗАД</button>
        </div>
    </div>

    <div id="overlay-vote" class="overlay hidden"><h2>КТО ШПИОН?</h2><div id="vote-list" class="grid-vote"></div></div>
    <div id="overlay-spy" class="overlay hidden">
        <h2>ТЫ РАСКРЫТ!</h2>
        <input id="spy-in" type="text" style="text-align:center;" placeholder="Слово..." onkeydown="if(event.key==='Enter') sendSpyGuess('final')">
        <button class="btn" onclick="sendSpyGuess('final')">ОТВЕТИТЬ</button>
    </div>
    <div id="overlay-res" class="overlay hidden">
        <div class="glass-card" style="width:80%;">
            <h1 style="color:var(--green)">ИТОГИ</h1>
            <p id="res-msg"></p>
            <p id="res-spy-name" style="color:#aaa; font-size:12px;"></p>
            <button class="btn" onclick="triggerReset()">В ЛОББИ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const SERVER_URL = "https://joystick-roast-unable.ngrok-free.dev"; 
        
        // Используем localStorage для сохранения данных навсегда
        let myName = localStorage.getItem('spy_nick') || "";
        let myRoom = localStorage.getItem('spy_room') || "";

        // Инициализация при загрузке
        if (!myName) {
            document.getElementById('screen-auth').classList.remove('hidden');
        } else if (!myRoom) {
            document.getElementById('screen-room-select').classList.remove('hidden');
        } else {
            startPolling();
        }

        function confirmNick() {
            const val = document.getElementById('nick-input').value.trim();
            if (val.length < 2) return;
            myName = val + "#" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('spy_nick', myName);
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-room-select').classList.remove('hidden');
        }

        function confirmRoom() {
            const val = document.getElementById('room-input').value.trim();
            if (!val) return;
            myRoom = val;
            localStorage.setItem('spy_room', myRoom);
            document.getElementById('screen-room-select').classList.add('hidden');
            startPolling();
        }

        function toggleRiskMenu(show) { 
            document.getElementById('overlay-risk').classList.toggle('hidden', !show); 
            if(show) setTimeout(()=>document.getElementById('risk-input').focus(), 100);
        }

        function startPolling() { 
            document.getElementById('display-room').innerText = myRoom;
            setInterval(mainLoop, 2000); 
            mainLoop(); 
        }

        async function mainLoop() {
            if (!myName || !myRoom) return;
            try {
                await fetch(`${SERVER_URL}/join`, { method: 'POST', headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, body: JSON.stringify({ room: myRoom, name: myName }) });
                const r = await fetch(`${SERVER_URL}/game_data?room=${myRoom}&name=${encodeURIComponent(myName)}`, { headers: {'ngrok-skip-browser-warning': 'true'} });
                const d = await r.json();

                if (!d.active) {
                    document.getElementById('screen-lobby').classList.remove('hidden');
                    document.getElementById('screen-game').classList.add('hidden');
                    document.querySelectorAll('.overlay:not(#screen-auth):not(#screen-room-select)').forEach(el => el.classList.add('hidden'));
                    updateLobby();
                } else {
                    document.getElementById('screen-lobby').classList.add('hidden');
                    document.getElementById('screen-game').classList.remove('hidden');
                    updateGame(d);
                }
            } catch (e) {}
        }

        async function updateLobby() {
            const res = await fetch(`${SERVER_URL}/players?room=${myRoom}`, { headers: {'ngrok-skip-browser-warning': 'true'} });
            const data = await res.json();
            document.getElementById('player-list').innerHTML = data.players.map(p => `<div class="glass-card" style="padding:10px; margin:0;">${p === myName ? "<b>(Вы)</b> " : ""}${p}</div>`).join('');
            const btn = document.getElementById('start-btn');
            btn.disabled = data.players.length < 3;
            btn.innerText = data.players.length >= 3 ? "НАЧАТЬ" : `ЖДЕМ (${data.players.length}/3)`;
        }

        function updateGame(d) {
            document.getElementById('g-role').innerText = d.role;
            document.getElementById('g-role').style.color = d.role === "ШПИОН" ? "var(--red)" : "var(--primary)";
            document.getElementById('g-word').innerText = d.word;
            document.getElementById('g-category').innerText = "КАТЕГОРИЯ: " + (d.category || "???");
            document.getElementById('g-round').innerText = `КРУГ ${d.round}/3`;
            document.getElementById('risk-btn').classList.toggle('hidden', d.role !== 'ШПИОН' || d.phase !== 'CHAT');

            const indicator = document.getElementById('turn-indicator');
            if (d.phase === 'CHAT') {
                indicator.innerText = d.is_my_turn ? "★ ТВОЙ ХОД! ★" : `ПИШЕТ: ${d.current_turn}`;
                indicator.style.color = d.is_my_turn ? "var(--green)" : "#aaa";
            } else indicator.innerText = d.phase;

            const chatIn = document.getElementById('chat-in');
            const sendBtn = document.getElementById('send-btn');
            
            chatIn.disabled = !d.is_my_turn || d.phase !== 'CHAT';
            sendBtn.disabled = !d.is_my_turn || d.phase !== 'CHAT';
            
            // Фокус для ПК при наступлении хода
            if(d.is_my_turn && chatIn.dataset.lastTurn !== "true") {
                chatIn.focus();
                chatIn.dataset.lastTurn = "true";
            } else if(!d.is_my_turn) {
                chatIn.dataset.lastTurn = "false";
            }

            document.getElementById('chat-box').innerHTML = d.messages.map(m => `
                <div class="msg ${m.user === myName ? 'me' : ''}">
                    <div style="font-size:8px; opacity:0.5;">${m.user}</div>${m.text}
                </div>`).join('');

            document.getElementById('overlay-vote').classList.toggle('hidden', d.phase !== 'VOTING');
            document.getElementById('overlay-spy').classList.toggle('hidden', d.phase !== 'SPY_GUESS' || d.role !== 'ШПИОН');
            document.getElementById('overlay-res').classList.toggle('hidden', d.phase !== 'RESULTS');

            if (d.phase === 'RESULTS') {
                document.getElementById('res-msg').innerText = d.result_msg;
                document.getElementById('res-spy-name').innerText = `Шпион: ${d.spy}`;
            }
            if (d.phase === 'VOTING' && document.getElementById('vote-list').innerHTML === "") {
                document.getElementById('vote-list').innerHTML = d.order.filter(p => p !== myName).map(p => `<button class="v-btn" onclick="sendVote('${p}')">${p}</button>`).join('');
            }
        }

        async function startGame() { await fetch(`${SERVER_URL}/start_game`, { method: 'POST', headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, body: JSON.stringify({ room: myRoom, name: myName }) }); }
        async function triggerReset() { if(confirm("Сбросить игру?")) await fetch(`${SERVER_URL}/reset`, { method: 'POST', headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, body: JSON.stringify({ room: myRoom, name: myName }) }); }

        async function sendMsg() {
            const input = document.getElementById('chat-in');
            const val = input.value.trim(); if(!val || input.disabled) return;
            input.value = "";
            await fetch(`${SERVER_URL}/send_message`, { method: 'POST', headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, body: JSON.stringify({ room: myRoom, name: myName, text: val }) });
        }
        
        async function sendVote(target) {
            document.getElementById('vote-list').innerHTML = "";
            await fetch(`${SERVER_URL}/vote`, { method: 'POST', headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, body: JSON.stringify({ room: myRoom, name: myName, target: target }) });
        }

        async function sendSpyGuess(type) {
            const fieldId = type === 'risk' ? 'risk-input' : 'spy-in';
            const input = document.getElementById(fieldId);
            const val = input.value.trim(); if(!val) return;
            if (type === 'risk') toggleRiskMenu(false);
            await fetch(`${SERVER_URL}/spy_guess`, { method: 'POST', headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'}, body: JSON.stringify({ room: myRoom, name: myName, text: val }) });
            input.value = "";
        }
    </script>
</body>
</html>
